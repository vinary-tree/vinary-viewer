<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="942px" preserveAspectRatio="none" style="width:633px;height:942px;background:#FBF8EF;" version="1.1" viewBox="0 0 633 942" width="633px" zoomAndPan="magnify"><?plantuml $version$?><defs/><g><rect fill="#FBF8EF" height="942" style="stroke:none;stroke-width:1;" width="633" x="0" y="0"/><g class="title" data-source-line="6"><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="561.7618" x="32.239" y="24.9659">LaTeX (.tex) rendering &#8212; a string crosses the unified@10 -&gt; unified@11 boundary</text></g><!--entity F--><g class="entity" data-qualified-name="F" data-source-line="8" id="ent0001"><rect fill="#D7EEC1" height="39.0679" rx="4" ry="4" style="stroke:#4A4A4A;stroke-width:0.5;" width="91.9737" x="229.0103" y="47.0679"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="71.9737" x="239.0103" y="72.0339">.tex source</text></g><!--entity C--><g class="entity" data-qualified-name="C" data-source-line="9" id="ent0002"><rect fill="#D7EEC1" height="77.2038" rx="4" ry="4" style="stroke:#4A4A4A;stroke-width:0.5;" width="341.3268" x="104.3303" y="165.1379"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="223.0891" x="114.3303" y="190.1039">unified-latex  (its own unified@10)</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="321.3268" x="114.3303" y="209.1718">parse -&gt; expand macros -&gt; strip newcommand -&gt;</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="179.9273" x="114.3303" y="228.2397">wrapPars -&gt; convertToHtml</text></g><!--entity R--><g class="entity" data-qualified-name="R" data-source-line="10" id="ent0003"><rect fill="#EEE6C1" height="58.1358" rx="4" ry="4" style="stroke:#4A4A4A;stroke-width:0.5;" width="144.5295" x="202.7303" y="321.3379"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="80.2477" x="212.7303" y="346.3039">HTML string</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="124.5295" x="212.7303" y="365.3718">(a single raw node)</text></g><!--entity S--><g class="entity" data-qualified-name="S" data-source-line="11" id="ent0004"><rect fill="#EBF4E1" height="96.2717" rx="4" ry="4" style="stroke:#4A4A4A;stroke-width:0.5;" width="291.2489" x="129.3703" y="440.4779"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="213.5692" x="139.3703" y="465.4439">app (unified@11) app-hast-suffix</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="271.2489" x="139.3703" y="484.5118">rehype-raw -&gt; tex-normalize -&gt; sanitize -&gt;</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="234.7091" x="139.3703" y="503.5797">slug -&gt; highlight -&gt; urls -&gt; images -&gt;</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="191.6873" x="139.3703" y="522.6476">source-positions -&gt; metadata</text></g><!--entity IR--><g class="entity" data-qualified-name="IR" data-source-line="12" id="ent0005"><rect fill="#F1D6BE" height="58.1358" rx="4" ry="4" style="stroke:#4A4A4A;stroke-width:0.5;" width="186.7534" x="181.6203" y="597.7479"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="166.7534" x="191.6203" y="622.7139">common IR + apply-posts</text><text fill