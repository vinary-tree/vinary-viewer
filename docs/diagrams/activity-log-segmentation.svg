depth = depth(F)</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" font-weight="700" lengthAdjust="spacing" textLength="39.4203" x="226.8942" y="307.2725">before</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="106.9207" x="269.4345" y="307.2725">applying L's braces</text><polygon fill="#F1F1F1" points="156.5648,340.7885,453.9807,340.7885,465.9807,352.7885,453.9807,364.7885,156.5648,364.7885,144.5648,352.7885,156.5648,340.7885" style="stroke:#181818;stroke-width:0.5;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="11" lengthAdjust="spacing" textLength="297.416" x="156.5648" y="357.0565">depth = 0  and  not continuation(L)  and  a record is open?</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="11" lengthAdjust="spacing" textLength="114.4102" x="30.1546" y="349.5655">boundary: new record</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="11" lengthAdjust="spacing" textLength="64.7785" x="465.9807" y="349.5655">same record</text><rect fill="#C7E8DE" height="52.6882" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="237.1295" x="16" y="374.7885"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="119.1969" x="26" y="397.6166">emit the open record</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="217.1295" x="26" y="413.9607">(one :record IR block, stable anchor-id)</text><rect fill="#F1F1F1" height="36.3441" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="197.0373" x="36.0461" y="447.4767"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="177.0373" x="46.0461" y="470.3048">start a fresh open record with L</text><rect fill="#F1F1F1" height="36.3441" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="180.9572" x="385.5022" y="374.7885"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="160.9572" x="395.5022" y="397.6166">append L to the open record</text><polygon fill="#F1F1F1" points="305.2728,489.8208,317.2728,501.8208,305.2728,513.8208,293.2728,501.8208,305.2728,489.8208" style="stroke:#181818;stroke-width:0.5;stroke-linejoin:miter;stroke-miterlimit:10;"/><path d="M474.3778,528.6059 L474.3778,556.1649 L454.3778,560.1649 L474.3778,564.1649 L474.3778,591.724 A0,0 0 0 0 474.3778,591.724 L775.632,591.724 A0,0 0 0 0 775.632,591.724 L775.632,538.6059 L765.632,528.6059 L474.3778,528.6059 A0,0 0 0 0 474.3778,528.6059" fill="#FFF6D6" style="stroke:#7F6B14;stroke-width:0.5;"/><path d="M765.632,528.6059 L765.632,538.6059 L775.632,538.6059 L765.632,528.6059" fill="#FFF6D6" style="stroke:#7F6B14;stroke-width:0.5;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="257.6732" x="480.3778" y="547.5029">the brace STACK is what keeps a multi-line</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="263.7312" x="480.3778" y="565.209">JSON entry ONE record &#8212; a header-looking</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="280.2543" x="480.3778" y="582.915">line at depth &gt; 0 can never trigger a boundary</text><rect fill="#EEE6C1" height="52.6882" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="298.21" x="156.1677" y="533.8208"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="218.2935" x="166.1677" y="556.6489">advance the pushdown by net-brace(L)</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="278.21" x="166.1677" y="572.993">(|net-brace| ob/cb tokens through advance-step)</text><polygon fill="#F1F1F1" points="305.2728,95.0679,317.2728,107.0679,305.2728,119.0679,293.2728,107.0679,305.2728,95.0679" style="stroke:#181818;stroke-width:0.5;stroke-linejoin:miter;stroke-miterlimit:10;"/><polygon fill="#F1F1F1" points="242.6007,611.724,367.9448,611.724,379.9448,623.724,367.9448,635.724,242.6007,635.724,230.6007,623.724,242.6007,611.724" style="stroke:#181818;stroke-width:0.5;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="11" lengthAdjust="spacing" textLength="95.1933" x="309.2728" y="647.4829">no / batch drained</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="11" lengthAdjust="spacing" textLength="125.3441" x="242.6007" y="627.9919">more lines in this batch?</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="11" lengthAdjust="spacing" textLength="17.0829" x="379.9448" y="620.501">yes</text><rect fill="#F1F1F1" height="36.3441" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="219.8495" x="195.348" y="668.9829"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="199.8495" x="205.348" y="691.811">on finish, flush the still-open record</text><ellipse cx="305.2728" cy="736.327" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="305.2728" cy="736.327" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#555555;stroke-width:1.3;" x1="305.2728" x2="305.2728" y1="175.412" y2="195.412"/><polygon fill="#555555" points="301.2728,185.412,305.2728,195.412,309.2728,185.412,305.2728,189.412" style="stroke:#555555;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#555555;stroke-width:1.3;" x1="305.2728" x2="