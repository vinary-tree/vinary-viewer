th="215.4214" x="197.5621" y="209.9279"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="195.4214" x="207.5621" y="232.756">read the next line L from the batch</text><rect fill="#F1F1F1" height="52.6882" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="260.9017" x="174.8219" y="266.272"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="116.4368" x="184.8219" y="289.1001">classify L (REGULAR):</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="240.9017" x="184.8219" y="305.4442">continuation?(L) via the continuation regex</text><rect fill="#F1F1F1" height="52.6882" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="176.7571" x="216.8942" y="338.9602"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="156.7571" x="226.8942" y="361.7883">read brace depth = depth(F)</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" font-weight="700" lengthAdjust="spacing" textLength="39.4203" x="226.8942" y="378.1324">before</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="106.9207" x="269.4345" y="378.1324">applying L's braces</text><polygon fill="#F1F1F1" points="156.5648,411.6485,453.9807,411.6485,465.9807,423.6485,453.9807,435.6485,156.5648,435.6485,144.5648,423.6485,156.5648,411.6485" style="stroke:#181818;stroke-width:0.5;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="11" lengthAdjust="spacing" textLength="297.416" x="156.5648" y="427.9164">depth = 0  and  not continuation(L)  and  a record is open?</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="11" lengthAdjust="spacing" 