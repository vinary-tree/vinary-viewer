<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="700px" preserveAspectRatio="none" style="width:1028px;height:700px;background:#FBF8EF;" version="1.1" viewBox="0 0 1028 700" width="1028px" zoomAndPan="magnify"><?plantuml $version$?><defs/><g><rect fill="#FBF8EF" height="700" style="stroke:none;stroke-width:1;" width="1028" x="0" y="0"/><g class="title" data-source-line="12"><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="226.7151" x="397.2966" y="24.9659">vinary-viewer &#8212; System Context</text></g><!--entity App--><g class="entity" data-qualified-name="App" data-source-line="22" id="ent0002"><rect fill="#2D9574" height="77.2038" rx="4" ry="4" style="stroke:#181818;stroke-width:1.6;" width="229.5792" x="416.56" y="280.5779"/><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="87.9616" x="426.56" y="305.5439">vinary-viewer</text><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="147.5454" x="426.56" y="324.6118">(Electron desktop app)</text><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="209.5792" x="426.56" y="343.6797">&#8212; reactive document previewer</text></g><!--entity User--><g class="entity" data-qualified-name="User" data-source-line="20" id="ent0001"><ellipse cx="531.3468" cy="62.0679" fill="#FFFFFF" rx="16" ry="16" style="stroke:#181818;stroke-width:0.5;"/><path d="M531.3468,82.0679 C535.3468,82.0679 538.3468,82.0679 542.3468,78.0679 C550.3468,78.0679 558.3468,86.0679 558.3468,94.0679 L558.3468,98.0679 C558.3468,102.0679 554.3468,106.0679 550.3468,106.0679 L512.3468,106.0679 C508.3468,106.0679 504.3468,102.0679 504.3468,98.0679 L504.3468,94.0679 C504.3468,86.0679 512.3468,78.0679 520.3468,78.0679 C524.3468,82.0679 527.3468,82.0679 531.3468,82.0679" fill="#FFFFFF" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="30.6179" x="465.19" y="121.5339">User</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="114.4636" x="465.19" y="140.6018">(reads docs, edits</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="132.3135" x="465.19" y="159.6697">in a separate editor)</text></g><!--entity Editor--><g class="entity" data-qualified-name="Editor" data-source-line="25" id="ent0003"><rect fill="#9F8766" height="77.2038" rx="4" ry="4" style="stroke:#181818;stroke-width:1.6;" width="178.7034" x="7" y="280.5779"/><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="45.7518" x="73.4758" y="305.5439">&#171;actor&#187;</text><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="96.9916" x="17" y="324.6118">External Editor</text><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="158.7034" x="17" y="343.6797">(Emacs, VS Code, Vim &#8230;)</text></g><!--entity FS--><g class="entity" data-qualified-name="FS" data-source-line="26" id="ent0004"><rect fill="#9F8766" height="77.2038" rx="4" ry="4" style="stroke:#181818;stroke-width:1.6;" width="192.8993" x="150.9" y="474.5979"/><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="68.9777" x="160.9" y="499.5639">Filesystem</text><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="172.8993" x="160.9" y="518.6318">(Markdown / images / text</text><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="51.3658" x="160.9" y="537.6997">on disk)</text></g><!--entity Git--><g class="entity" data-qualified-name="Git" data-source-line="27" id="ent0005"><rect fill="#9F8766" height="77.2038" rx="4" ry="4" style="stroke:#181818;stroke-width:1.6;" width="127.9816" x="625.36" y="474.5979"/><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="88.4377" x="635.36" y="499.5639">git repository</text><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="89.8222" x="635.36" y="518.6318">(`git ls-files` &#8594;</text><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="107.9816" x="635.36" y="537.6997">file-tree sidebar)</text></g><g class="entity" data-qualified-name="GMN12" data-source-line="37" id="ent0013"><path d="M681.4,282.7679 L681.4,315.1779 L646.46,319.1779 L681.4,323.1779 L681.4,355.592 A4,4 0 0 0 685.4,359.592 L1009.3083,359.592 A4,4 0 0 0 1013.3083,355.592 L1013.3083,288.7679 L1003.3083,278.7679 L685.4,278.7679 A4,4 0 0 0 681.4,282.7679" fill="#FFF6D6" style="stroke:#7F6B14;stroke-width:0.5;"/><path d="M1003.3083,278.7679 L1003.3083,286.7679 A2,2 0 0 0 1005.3083,288.7679 L1013.3083,288.7679 L1003.3083,278.7679" fill="#FFF6D6" style="stroke:#7F6B14;stroke-width:0.5;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="94.6401" x="687.4" y="297.6649">vinary-viewer is</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="61.607" x="785.4201" y="297.6649">read-only</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="90.8051" x="850.4071" y="297.6649">with respect to</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="277.5892" x="687.4" y="315.3709">user content: it never writes the documents it</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="310.9083" x="687.4" y="333.077">previews. Editing happens in the user's own editor;</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="268.6452" x="687.4" y="350.783">the viewer reflects every save automatically.</text></g><!--link User to App--><g class="link" data-entity-1="ent0001" data-entity-2="ent0002" data-link-type="dependency" data-source-line="29" id="lnk6"><path d="M531.35,164.0179 C531.35,201.1279 531.35,243.0979 531.35,275.3779" fill="none" id="User-to-App" style="stroke:#555555;stroke-width:1.3;"/><polygon fill="#555555" points="531.35,280.3779,535.35,271.3779,531.35,275.3779,527.35,271.3779,531.35,280.3779" style="stroke:#555555;stroke-width:1.3;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="161.0702" x="532.35" y="208.6649">launches `vv README.md`,</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="138.9441" x="543.413" y="226.3709">clicks tabs / tree / TOC,</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="132.1971" x="546.7865" y="244.077">finds, switches theme</text></g><!--link Editor to FS--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="30" id="lnk7"><path d="M84.87,358.0679 C79.26,384.4379 76.81,419.2679 93.35,444.5979 C106.84,465.2479 123.6386,477.6125 146.2086,487.6125" fill="none" id="Editor-to-FS" style="stroke:#555555;stroke-width:1.3;"/><polygon fill="#555555" points="150.78,489.6379,144.1718,482.335,146.2086,487.6125,140.9311,489.6493,150.78,489.6379" style="stroke:#555555;stroke-width:1.3;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="79.0141" x="109.5925" y="413.4949">saves the file</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="109.4991" x="94.35" y="431.2009">the user is editing</text></g><!--link App to FS--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="31" id="lnk8"><path d="M416.27,333.4679 C346.15,344.1879 265.99,362.0979 244.35,389.5979 C225.85,413.0979 227.4176,442.8702 233.6276,469.3302" fill="none" id="App-to-FS" style="stroke:#555555;stroke-width:1.3;"/><polygon fill="#555555" points="234.77,474.1979,236.6078,464.522,233.6276,469.3302,228.8194,466.3499,234.77,474.1979" style="stroke:#555555;stroke-width:1.3;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="36.101" x="265.617" y="404.4949">reads</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="72.2671" x="305.098" y="404.4949">file content;</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="54.002" x="245.35" y="422.2009">watches</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="94.9001" x="302.732" y="422.2009">each open path</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="60.8921" x="291.045" y="439.907">(chokidar)</text></g><!--link FS to App--><g class="link" data-entity-1="ent0004" data-entity-2="ent0002" data-link-type="dependency" data-source-line="32" id="lnk9"><path d="M343.96,481.3179 C364.72,471.7379 385.47,459.6279 402.35,444.5979 C423.47,425.7879 415.32,410.5079 434.35,389.5979 C444.73,378.1879 453.2785,370.5226 465.8585,361.1626" fill="none" id="FS-to-App" style="stroke:#555555;stroke-width:1.3;stroke-dasharray:7,7;"/><polygon fill="#555555" points="469.87,358.1779,460.2617,360.3412,465.8585,361.1626,465.0371,366.7595,469.87,358.1779" style="stroke:#555555;stroke-width:1.3;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="138.0211" x="435.35" y="413.4949">`change` / `add` events</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="90.1758" x="459.2727" y="431.2009">&#10230; live refresh</text></g><!--link App to Git--><g class="link" data-entity-1="ent0002" data-entity-2="ent0005" data-link-type="dependency" data-source-line="33" id="lnk10"><path d="M559.78,358.0979 C567.24,368.2579 575.19,379.2779 582.35,389.5979 C599.01,413.5979 599.65,422.1479 618.35,444.5979 C626.85,454.7879 633.1618,461.5761 642.8418,470.9161" fill="none" id="App-to-Git" style="stroke:#555555;stroke-width:1.3;"/><polygon fill="#555555" points="646.44,474.3879,642.7407,465.2602,642.8418,470.9161,637.1859,471.0172,646.44,474.3879" style="stroke:#555555;stroke-width:1.3;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="95.2511" x="619.35" y="413.4949">`git rev-parse` +</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="65.2341" x="634.3585" y="431.2009">`git ls-files`</text></g><!--link Git to App--><g class="link" data-entity-1="ent0005" data-entity-2="ent0002" data-link-type="dependency" data-source-line="34" id="lnk11"><path d="M713.48,474.1579 C726.5,448.3379 736.7,414.4979 719.35,389.5979 C714.21,382.2079 687.2095,371.099 651.2495,358.519" fill="none" id="Git-to-App" style="stroke:#555555;stroke-width:1.3;stroke-dasharray:7,7;"/><polygon fill="#555555" points="646.53,356.8679,653.7043,363.6154,651.2495,358.519,656.346,356.0642,646.53,356.8679" style="stroke:#555555;stroke-width:1.3;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="145.9121" x="729.55" y="422.4949">repo root + tracked files</text></g><g class="legend" data-source-line="43"><rect fill="none" height="109.3396" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="438.3424" x="570.9659" y="571.8017"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="46.0178" x="579.6059" y="593.7676">Colour</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="57.3438" x="632.9037" y="593.7676">Concept</text><rect fill="#2D9574" height="19.0679" style="stroke:none;stroke-width:1;" width="53.2978" x="575.9659" y="597.8696"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="3.64" x="575.9659" y="612.8355">&#160;</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="189.5033" x="632.9037" y="612.8355">the vinary-viewer application</text><rect fill="#9F8766" height="19.0679" style="stroke:none;stroke-width:1;" width="53.2978" x="575.9659" y="616.9375"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="3.64" x="575.9659" y="631.9034">&#160;</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="203.0832" x="632.9037" y="631.9034">filesystem &#183; external editor &#183; git</text><rect fill="#FFFFFF" height="19.0679" style="stroke:none;stroke-width:1;" width="53.2978" x="575.9659" y="636.0054"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="3.64" x="575.9659" y="650.9714">&#160;</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="84.4197" x="632.9037" y="650.9714">human actor</text><line style="stroke:#000000;stroke-width:1;" x1="575.9659" x2="839.6269" y1="578.8017" y2="578.8017"/><line style="stroke:#000000;stroke-width:1;" x1="575.9659" x2="839.6269" y1="597.8696" y2="597.8696"/><line style="stroke:#000000;stroke-width:1;" x1="575.9659" x2="839.6269" y1="616.9375" y2="616.9375"/><line style="stroke:#000000;stroke-width:1;" x1="575.9659" x2="839.6269" y1="636.0054" y2="636.0054"/><line style="stroke:#000000;stroke-width:1;" x1="575.9659" x2="839.6269" y1="655.0733" y2="655.0733"/><line style="stroke:#000000;stroke-width:1;" x1="575.9659" x2="575.9659" y1="578.8017" y2="655.0733"/><line style="stroke:#000000;stroke-width:1;" x1="629.2637" x2="629.2637" y1="578.8017" y2="655.0733"/><line style="stroke:#000000;stroke-width:1;" x1="839.6269" x2="839.6269" y1="578.8017" y2="655.0733"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="428.3424" x="575.9659" y="672.0393">Solid arrow = request / command &#183; Dashed = asynchronous event</text></g></g></svg>