<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="700px" preserveAspectRatio="none" style="width:1022px;height:700px;background:#FBF8EF;" version="1.1" viewBox="0 0 1022 700" width="1022px" zoomAndPan="magnify"><?plantuml $version$?><defs/><g><rect fill="#FBF8EF" height="700" style="stroke:none;stroke-width:1;" width="1022" x="0" y="0"/><g class="title" data-source-line="12"><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="226.7151" x="394.2966" y="24.9659">vinary-viewer &#8212; System Context</text></g><!--entity App--><g class="entity" data-qualified-name="App" data-source-line="22" id="ent0002"><rect fill="#2D9574" height="77.2038" rx="4" ry="4" style="stroke:#181818;stroke-width:1.6;" width="229.5792" x="410.56" y="280.5779"/><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="87.9616" x="420.56" y="305.5439">vinary-viewer</text><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="147.5454" x="420.56" y="324.6118">(Electron desktop app)</text><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="209.5792" x="420.56" y="343.6797">&#8212; reactive document previewer</text></g><!--entity User--><g class="entity" data-qualified-name="User" data-source-line="20" id="ent0001"><ellipse cx="525.3468" cy="62.0679" fill="#FFFFFF" rx="16" ry="16" style="stroke:#181818;stroke-width:0.5;"/><path d="M525.3468,82.0679 C529.3468,82.0679 532.3468,82.0679 536.3468,78.0679 C544.3468,78.0679 552.3468,86.0679 552.3468,94.0679 L552.3468,98.0679 C552.3468,102.0679 548.3468,106.0679 544.3468,106.0679 L506.3468,106.0679 C502.3468,106.0679 498.3468,102.0679 498.3468,98.0679 L498.3468,94.0679 C498.3468,86.0679 506.3468,78.0679 514.3468,78.0679 C518.3468,82.0679 521.3468,82.0679 525.3468,82.0679" fill="#FFFFFF" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="30.6179" x="459.19" y="121.5339">User</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="114.4636" x="459.19" y="140.6018">(reads docs, edits</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="132.3135" x="459.19" y="159.6697">in a separate editor)</text></g><!--entity Editor--><g class="entity" data-qualified-name="Editor" data-source-line="25" id="ent0003"><rect fill="#9F8766" height="77.2038" rx="4" ry="4" style="stroke:#181818;stroke-width:1.6;" width="178.7034" x="7" y="280.5779"/><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="45.7518" x="73.4758" y="305.5439">&#171;actor&#187;</text><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="96.9916" x="17" y="324.6118">External Editor</text><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="158.7034" x="17" y="343.6797">(Emacs, VS Code, Vim &#8230;)</text></g><!--entity FS--><g class="entity" data-qualified-name="FS" data-source-line="26" id="ent0004"><rect fill="#9F8766" height="77.2038" rx="4" ry="4" style="stroke:#181818;stroke-width:1.6;" width="192.8993" x="150.9" y="474.5979"/><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="68.9777" x="160.9" y="499.5639">Filesystem</text><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="172.8993" x="160.9" y="518.6318">(Markdown / images / text</text><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="51.3658" x="160.9" y="537.6997">on disk)</text></g><!--entity Git--><g class="entity" data-qualified-name="Git" data-source-line="27" id="ent0005"><rect fill="#9F8766" height="77.2038" rx="4" ry="4" style="stroke:#181818;stroke-width:1.6;" width="127.9816" x="619.36" y="474.5979"/><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="88.4377" x="629.36" y="499.5639">git repository</text><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="89.8222" x="629.36" y="518.6318">(`git ls-files` &#8594;</text><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="107.9816" x="629.36" y="537.6997">file-tree sidebar)</text></g><g class="entity" data-qualified-name="GMN12" data-source-line="37" id="ent0013"><path d="M675.4,282.7679 L675.4,315.1779 L640.46,319.1779 L675.4,323.1779 L675.4,355.592 A4,4 0 0 0 679.4,359.592 L1003.3083,359.592 A4,4 0 0 0 1007.3083,355.592 L1007.3083,288.7679 L997.3083,278.7679 L679.4,278.7679 A4,4 0 0 0 675.4,282.7679" fill="#FFF6D6" style="stroke:#7F6B14;stroke-width:0.5;"/><path d="M997.3083,278.7679 L997.3083,286.7679 A2,2 0 0 0 999.3083,288.7679 L1007.3083,288.7679 L997.3083,278.7679" fill="#FFF6D6" style="stroke:#7F6B14;stroke-width:0.5;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="94.6401" x="681.4" y="297.6649">vinary-viewer is</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="61.607" x="779.4201" y="297.6649">read-only</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="90.8051" x="844.4071" y="297.6649">with respect to</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="277.5892" x="681.4" y="315.3709">user content: it never writes the documents it</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="310.9083" x="681.4" y="333.077">previews. Editing happens in the user's own editor;</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="268.6452" x="681.4" y="350.783">the viewer reflects every save automatically.</text></g><!--link User to App--><g class="link" data-entity-1="ent0001" data-entity-2="ent0002" data-link-type="dependency" data-source-line="29" id="lnk6"><path d="M525.35,164.0179 C525.35,201.1279 525.35,243.0979 525.35,275.3779" fill="none" id="User-to-App" style="stroke:#555555;stroke-width:1.3;"/><polygon fill="#555555" points="525.35,280.3779,529.35,271.3779,525.35,275.3779,521.35,271.3779,525.35,280.3779" style="stroke:#555555;stroke-width:1.3;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="161.0702" x="526.35" y="208.6649">launches `vv README.md`,</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="138.9441" x="537.413" y="226.3709">clicks tabs / tree / TOC,</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="132.1971" x="540.7865" y="244.077">finds, switches theme</text></g><!--link Editor to FS--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="30" id="lnk7"><path d="M84.87,358.0679 C79.26,384.4379 76.81,419.2679 93.35,444.5979 C106.84,465.2479 123.6386,477.6125 146.2086,487.6125" fill="none" id="Editor-to-FS" style="stroke:#555555;stroke-widt