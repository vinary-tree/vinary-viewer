<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="984px" preserveAspectRatio="none" style="width:1056px;height:984px;background:#FBF8EF;" version="1.1" viewBox="0 0 1056 984" width="1056px" zoomAndPan="magnify"><?plantuml $version$?><defs/><g><rect fill="#FBF8EF" height="984" style="stroke:none;stroke-width:1;" width="1056" x="0" y="0"/><g class="title" data-source-line="6"><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="602.7677" x="226.0092" y="34.9659">Asset vendoring &#8212; `sync-*.mjs` pins provenance into a lockfile; `check-*.mjs` verifies it</text></g><rect fill="none" height="24.5158" style="stroke:none;stroke-width:1;" width="1009.7861" x="20" y="58.8419"/><rect fill="#E4E8F1" height="750.9893" style="stroke:#E4E8F1;stroke-width:1;" width="483.0191" x="20" y="58.8419"/><ellipse cx="262.5096" cy="98.3577" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#E4E8F1" height="52.6882" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="227.0375" x="148.9908" y="128.3577"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="207.0375" x="158.9908" y="151.1858">resolve the pinned upstream version</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="151.8011" x="158.9908" y="167.5299">(from the script's manifest)</text><rect fill="#EEEBE8" height="52.6882" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="194.2053" x="165.4069" y="201.046"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="93.2287" x="175.4069" y="223.874">fetch the artifact</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="174.2053" x="175.4069" y="240.2182">(npm registry / GitHub release)</text><rect fill="#DFD9D0" height="36.3441" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="259.4138" x="132.8027" y="273.7342"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="239.4138" x="142.8027" y="296.5623">copy the vendored files into `resources/**`</text><rect fill="#C9D2E6" height="69.0323" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="264.8258" x="130.0967" y="330.0783"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="177.3373" x="140.0967" y="352.9064">write provenance to the lockfile</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="244.8258" x="140.0967" y="369.2505">(`scripts/{assets,grammars,pdfjs}.lock.json`:</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="127.5249" x="140.0967" y="385.5946">version + sha + file list)</text><ellipse cx="262.5096" cy="430.1106" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="262.5096" cy="430.1106" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1.5;" x1="20" x2="20" y1="58.8419" y2="809.8312"/><rect fill="#F4F1E1" height="750.9893" style="stroke:#F4F1E1;stroke-width:1;" width="525.4269" x="503.0191" y="58.8419"/><ellipse cx="770.9566" cy="461.1106" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#E4E8F1" height="36.3441" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="174.6931" x="683.6101" y="491.1106"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="154.6931" x="693.6101" y="513.9387">read the committed lockfile</text><rect fill="#DFD9D0" height="36.3441" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="195.5973" x="673.158" y="547.4548"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="175.5973" x="683.158" y="570.2828">hash the vendored files on disk</text><polygon fill="#F1F1F1" points="702.7076,603.7989,839.2057,603.7989,851.2057,615.7989,839.2057,627.7989,702.7076,627.7989,690.7076,615.7989,702.7076,603.7989" style="stroke:#181818;stroke-width:0.5;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="11" lengthAdjust="spacing" textLength="136.498" x="702.7076" y="620.0668">on-disk hashes == lockfile?</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="11" lengthAdjust="spacing" textLength="32.5048" x="658.2029" y="612.5759">match</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="11" lengthAdjust="spacing" textLength="21.9008" x="851.2057" y="612.5759">drift</text><rect fill="#D7EEC1" height="36.3441" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="206.3974" x="558.7833" y="637.7989"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="186.3974" x="568.7833" y="660.627">exit 0 &#8212; vendored assets verified</text><ellipse cx="661.982" cy="720.143" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="661.982" cy="720.143" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><rect fill="#F0C0BF" height="52.6882" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="189.5012" x="785.1807" y="637.7989"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="168.2892" x="795.1807" y="660.627">FAIL &#8212; vendored assets differ</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="169.5012" x="795.1807" y="676.9711">from their pinned provenance</text><rect fill="#F5E1E0" height="36.3441" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="180.3331" x="789.7647" y="725.4871"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="160.3331" x="799.7647" y="748.3152">re-run `*:sync` or investigate</text><ellipse cx="879.9313" cy="792.8312" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="879.9313" cy="792.8312" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1.5;" x1="503.0191" x2="503.0191" y1="58.8419" y2="809.8312"/><line style="stroke:#000000;stroke-width:1.5;" x1="1028.4461" x2="1028.4461" y1="58.8419" y2="809.8312"/><line style="stroke:#555555;stroke-width:1.3;" x1="262.5096" x2="262.5096" y1="108.3577" y2="128.3577"/><polygon fill="#555555" points="258.5096,118.3577,262.5096,128.3577,266.5096,118.3577,262.5096,122.3577" style="stroke:#555555;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#555555;stroke-width:1.3;" x1="262.5096" x2="262.5096" y1="181.046" y2="201.046"/><polygon fill="#555555" points="258.5096,191.046,262.5096,201.046,266.5096,191.046,262.5096,195.046" style="stroke:#555555;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#555555;stroke-width:1.3;" x1="262.5096" x2="262.5096" y1="253.7342" y2="273.7342"/><polygon fill="#555555" points="258.5096,263.7342,262.5096,273.7342,266.5096,263.7342,262.5096,267.7342" style="stroke:#555555;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#555555;stroke-width:1.3;" x1="262.5096" x2="262.5096" y1="310.0783" y2="330.0783"/><polygon fill="#555555" points="258.5096,320.0783,262.5096,330.0783,266.5096,320.0783,262.5096,324.0783" style="stroke:#555555;stroke