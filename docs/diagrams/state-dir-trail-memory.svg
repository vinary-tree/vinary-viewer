<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="355px" preserveAspectRatio="none" style="width:1362px;height:355px;background:#FBF8EF;" version="1.1" viewBox="0 0 1362 355" width="1362px" zoomAndPan="magnify"><?plantuml $version$?><defs/><g><rect fill="#FBF8EF" height="355" style="stroke:none;stroke-width:1;" width="1362" x="0" y="0"/><g class="title" data-source-line="6"><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="404.8629" x="475.0987" y="24.9659">Alt+Up / Alt+Down over the persisted directory&#8594;child trail</text></g><g class="entity" data-qualified-name="FILE" data-source-line="8" id="ent0001"><rect fill="#F1F1F1" height="58.1358" rx="4" ry="4" style="stroke:#181818;stroke-width:1.4;" width="143.3255" x="685.44" y="279.5479"/><line style="stroke:#181818;stroke-width:1.4;" x1="685.44" x2="828.7655" y1="327.6838" y2="327.6838"/><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="123.3255" x="695.44" y="299.5139">Viewing  /a/b/c.md</text><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="39.8298" x="695.44" y="318.5818">(a file)</text></g><g class="entity" data-qualified-name="DIRB" data-source-line="9" id="ent0002"><rect fill="#F1F1F1" height="58.1358" rx="4" ry="4" style="stroke:#181818;stroke-width:1.4;" width="126.5256" x="479.84" y="92.5779"/><line style="stroke:#181818;stroke-width:1.4;" x1="479.84" x2="606.3656" y1="140.7138" y2="140.7138"/><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="96.0956" x="489.84" y="112.5439">Browsing  /a/b</text><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="106.5256" x="489.84" y="131.6118">highlight = c.md</text></g><g class="entity" data-qualified-name="DIRA" data-source-line="10" id="ent0003"><rect fill="#F1F1F1" height="58.1358" rx="4" ry="4" style="stroke:#181818;stroke-width:1.4;" width="102.9637" x="74.62" y="279.5479"/><line style="stroke:#181818;stroke-width:1.4;" x1="74.62" x2="177.5837" y1="327.6838" y2="327.6838"/><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="82.2777" x="84.62" y="299.5139">Browsing  /a</text><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="82.9637" x="84.62" y="318.5818">highlight = b</text></g><g class="start_entity" data-qualified-name=".start." data-source-line="12" id="ent0004"><ellipse cx="947.1" cy="121.6479" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/></g><g class="entity" data-qualified-name="GMN10" data-source-line="20" id="ent0011"><path d="M992.54,85.2379 L992.54,158.062 A4,4 0 0 0 996.54,162.062 L1249.6632,162.062 A4,4 0 0 0 1253.6632,158.062 L1253.6632,91.2379 L1243.6632,81.2379 L996.54,81.2379 A4,4 0 0 0 992.54,85.2379" fill="#FFF6D6" style="stroke:#7F6B14;stroke-width:0.5;"/><path d="M1243.6632,81.2379 L1243.6632,89.2379 A2,2 0 0 0 1245.6632,91.2379 L1253.6632,91.2379 L1243.6632,81.2379" fill="#FFF6D6" style="stroke:#7F6B14;stroke-width:1;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="205.8162" x="998.54" y="100.1349">highlight = nav/effective-selected:</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="236.7432" x="1001.92" y="117.8409">&#8226; explicit dir-selected (if a current child)</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="85.2281" x="1001.92" y="135.547">&#8226; else trail[dir]</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="155.2201" x="1001.92" y="153.253">&#8226; else the first listed entry</text></g><g class="entity" data-qualified-name="GMN13" data-source-line="27" id="ent0014"><path d="M899.14,281.0579 L899.14,336.176 A4,4 0 0 0 903.14,340.176 L1343.0603,340.176 A4,4 0 0 0 1347.0603,336.176 L1347.0603,287.0579 L1337.0603,277.0579 L903.14,277.0579 A4,4 0 0 0 899.14,281.0579" fill="#FFF6D6" style="stroke:#7F6B14;stroke-width:0.5;"/><path d="M1337.0603,277.0579 L1337.0603,285.0579 A2,2 0 0 0 1339.0603,287.0579 L1347.0603,287.0579 L1337.0603,277.0579" fill="#FFF6D6" style="stroke:#7F6B14;stroke-width:1;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="395.7853" x="905.14" y="295.9549">The trail lives in recent.edn ([:ui :recent :trail]) and persists across</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="399.8933" x="905.14" y="313.6609">sessions, so revisiting /a/b in a later run still highlights c.md. Each</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="426.9203" x="905.14" y="331.367">Alt+Up / Alt+Down also pushes the per-tab history (Alt+Left undoes it).</text></g><!--link *start* to FILE--><g class="link" data-entity-1="ent0004" data-entity-2="ent0001" data-link-type="dependency" data-source-line="12" id="lnk5"><path d="M946.79,132.0979 C945.55,154.8679 939.31,213.3279 908.1,247.0579 C887.29,269.5579 861.7492,282.3248 833.7492,291.3448" fill="none" id="*start*-to-FILE" style="stroke:#555555;stroke-width:1.3;"/><polygon fill="#555555" points="828.99,292.8779,838.783,293.9256,833.7492,291.3448,836.33,286.311,828.99,292.8779" style="stroke:#555555;stroke-width:1.3;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="94.2761" x="956.6584" y="206.9549">open /a/b/c.md</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="123.9291" x="941.8319" y="224.6609">record-recent writes</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="133.4928" x="937.05" y="242.367">/&#8594;a, /a&#8594;b, /a/b&#8594;c.md</text></g><!--link FILE to DIRB--><g class="link" data-entity-1="ent0001" data-entity-2="ent0002" data-link-type="dependency" data-source-line="14" id="lnk6"><path d="M685.14,297.0379 C629.05,287.1479 557.81,270.3879 540.1,247.0579 C519.4,219.7879 524.138,183.4044 531.778,155.9844" fill="none" id="FILE-to-DIRB" style="stroke:#555555;stroke-width:1.3;"/><polygon fill="#555555" points="533.12,151.1679,526.8511,158.7641,531.778,155.9844,534.5576,160.9113,533.12,151.1679" style="stroke:#555555;stroke-width:1.3;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="43.992" x="541.1" y="224.9549">Alt+Up</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="121.3797" x="591.852" y="224.9549">(:nav/parent &#8594; /a/b)</text></g><!--link DIRB to FILE--><g class="link" data-entity-1="ent0002" data-entity-2="ent0001" data-link-type="dependency" data-source-line="17" id="lnk9"><path d="M606.44,133.9179 C643.49,143.5579 688.63,161.0079 718.1,192.0579 C740.77,215.9379 749.5268,248.5065 753.5068,274.2765" fill="none" id="DIRB-to-FILE" style="stroke:#555555;stroke-width:1.3;"/><polygon fill="#555555" points="754.27,279.2179,756.8494,269.7128,753.5068,274.2765,748.9432,270.9339,754.27,279.2179" style="stroke:#555555;stroke-width:1.3;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-ser