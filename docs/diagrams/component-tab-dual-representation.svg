<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="864px" preserveAspectRatio="none" style="width:1109px;height:864px;background:#FBF8EF;" version="1.1" viewBox="0 0 1109 864" width="1109px" zoomAndPan="magnify"><?plantuml $version$?><defs/><g><rect fill="#FBF8EF" height="864" style="stroke:none;stroke-width:1;" width="1109" x="0" y="0"/><g class="title" data-source-line="6"><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="571.3099" x="265.5165" y="24.9659">Tabs &#8212; one ordered model, two representations (reordering either reorders both)</text></g><!--entity MODEL--><g class="entity" data-qualified-name="MODEL" data-source-line="8" id="ent0001"><rect fill="#C5CFEA" height="77.2038" rx="4" ry="4" style="stroke:#4A4A4A;stroke-width:0.5;" width="194.3553" x="538.84" y="47.0679"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="111.2856" x="548.84" y="72.0339">app-db [:ui :tabs]</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="157.8214" x="548.84" y="91.1018">ORDERED vector of tabs</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="174.3553" x="548.84" y="110.1697">(the single source of truth)</text></g><!--entity ITEM--><g class="entity" data-qualified-name="ITEM" data-source-line="10" id="ent0002"><rect fill="#C7E8DE" height="77.2038" rx="4" ry="4" style="stroke:#4A4A4A;stroke-width:0.5;" width="308.4128" x="274.82" y="359.4779"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="149.0294" x="284.82" y="384.4439">vinary.ui.tabs/tab-item</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="124.7535" x="284.82" y="403.5118">shared component</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="288.4128" x="284.82" y="422.5797">(click &#183; &#215; close &#183; right-click menu &#183; draggable)</text></g><!--entity STRIP--><g class="entity" data-qualified-name="STRIP" data-source-line="12" id="ent0003"><rect fill="#C7E8DE" height="77.2038" rx="4" ry="4" style="stroke:#4A4A4A;stroke-width:0.5;" width="184.3734" x="321.84" y="203.2679"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="125.2995" x="331.84" y="228.2339">horizontal tab strip</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="164.3734" x="331.84" y="247.3018">(above the content pane)</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="72.0982" x="331.84" y="266.3697">left &#8594; right</text></g><!--entity PANEL--><g class="entity" data-qualified-name="PANEL" data-source-line="13" id="ent0004"><rect fill="#C7E8DE" height="77.2038" rx="4" ry="4" style="stroke:#4A4A4A;stroke-width:0.5;" width="195.2093" x="541.42" y="203.2679"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="175.2093" x="551.42" y="228.2339">vertical Tabs sidebar panel</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="149.8414" x="551.42" y="247.3018">(Files &#183; Contents &#183; Tabs)</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="89.8922" x="551.42" y="266.3697">top &#8594; bottom</text></g><!--entity REORDER--><g class="entity" data-qualified-name="REORDER" data-source-line="15" id="ent0005"><rect fill="#C4D9EB" height="77.2038" rx="4" ry="4" style="stroke:#4A4A4A;stroke-width:0.5;" width="211.5878" x="597.23" y="515.6779"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="80.6957" x="607.23" y="540.6439">:tab/reorder</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="191.5878" x="607.23" y="559.7118">(reg-event-db &#8594; nav/reorder)</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="81.8297" x="607.23" y="578.7797">vector splice</text></g><!--entity CTX--><g class="entity" data-qualified-name="CTX" data-source-line="16" id="ent0006"><rect fill="#C4D9EB" height="77.2038" rx="4" ry="4" style="stroke:#4A4A4A;stroke-width:0.5;" width="231.1332" x="215.46" y="515.6779"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="211.1332" x="225.46" y="540.6439">:context-menu/show {:kind :tab}</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="138.1515" x="225.46" y="559.7118">Close &#183; Close Others &#183;</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="207.0032" x="225.46" y="578.7797">Close to the Right &#183; View Source</text></g><g class="entity" data-qualified-name="GMN14" data-source-line="27" id="ent0015"><path d="M6,657.8879 L6,730.712 A4,4 0 0 0 10,734.712 L652.0444,734.712 A4,4 0 0 0 656.0444,730.712 L656.0444,663.8879 L646.0444,653.8879 L335.02,653.8879 L331.02,593.3579 L327.02,653.8879 L10,653.8879 A4,4 0 0 0 6,657.8879" fill="#FFF6D6" style="stroke:#7F6B14;stroke-width:0.5;"/><path d="M646.0444,653.8879 L646.0444,661.8879 A2,2 0 0 0 648.0444,663.8879 L656.0444,663.8879 L646.0444,653.8879" fill="#FFF6D6" style="stroke:#7F6B14;stroke-width:0.5;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="251.6542" x="12" y="672.7849">Because both representations render the</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="34.749" x="267.0342" y="672.7849">same</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="234.7672" x="305.1633" y="672.7849">ordered `[:ui :tabs]` vector through the</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="34.749" x="543.3105" y="672.7849">same</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="592.7456" x="12" y="690.4909">`tab-item`, top&#8594;bottom in the panel always equals left&#8594;right in the strip, and a drag in either one</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="629.0444" x="12" y="708.197">splices the one vector &#8212; so the orders never drift. The vertical panel is most useful when more tabs are</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="157.3782" x="12" y="725.903">open than fit horizontally.</text></g><!--link MODEL to STRIP--><g class="link" data-entity-1="ent0001" data-entity-2="ent0003" data-link-type="dependency" data-source-line="18" id="lnk7"><path d="M572.23,124.7679 C557.22,134.1379 541.4,144.3379 527.02,154.2679 C504.96,169.5179 485.2438,184.3244 465.3038,199.8644" fill="none" id="MODEL-to-STRIP" style="stroke:#555555;stroke-width:1.3;"/><polygon fill="#555555" points="461.36,202.9379,470.9176,200.5606,465.3038,199.8644,466,194.2505,461.36,202.9379" style="stroke:#555555;stroke-width:1.3;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="96.9931" x="528.02" y="169.1649">render in :order</text></g><!--link MODEL to PANEL--><g class="link" data-entity-1="ent0001" data-entity-2="ent0004" data-link-type="dependency" data-source-line="19" id="lnk8"><path d="M633.41,124.6179 C632.71,139.7579 632.32,157.3379 633.02,173.2679 C633.45,182.9279 633.7831,188.347 634.6331,198.037" fill="none" id="MODEL-to-PANEL" style="stroke:#555555;stroke-width:1.3;"/><polygon fill="#555555" points="635.07,203.0179,638.2682,193.7028,634.6331,198.037,630.2988,194.4019,635.07,203.0179" style="stroke:#555555;stroke-width:1.3;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="158.2752" x="634.02" y="169.1649">render in the SAME :order</text></g><!--link STRIP to ITEM--><g class="link" data-entity-1="ent0003" data-entity-2="ent0002" data-link-type="dependency" data-source-line="20" id="lnk9"><path d="M417.69,280.5979 C420.02,304.4879 422.5253,330.3115 424.8553,354.2315" fill="none" id="STRIP-to-ITEM" style="stroke:#555555;stroke-width:1.3;"/><polygon fill="#555555" points="425.34,359.2079,428.4486,349.8625,424.8553,354.2315,420.4863,350.6381,425.34,359.2079" style="stroke:#555555;stroke-width:1.3;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="52.26" x="423.42" y="325.3749">each tab</text></g><!--link PANEL to ITEM--><g class="link" data-entity-1="ent0004" data-entity-2="ent0002" data-link-type="dependency" data-source-line="21" id="lnk10"><path d="M587.38,280.7979 C554.96,304.6079 517.31,332.2484 484.86,356.0784" fill="none" id="PANEL-to-ITEM" style="stroke:#555555;stroke-width:1.3;"/><polygon fill="#555555" points="480.83,359.0379,490.4517,356.9348,484.86,356.0784,485.7165,350.4868,480.83,359.0379" style="stroke:#555555;stroke-width:1.3;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="52.26" x="547.6" y="325.3749">each tab</text></g><!--link ITEM to REORDER--><g class="link" data-entity-1="ent0002" data-entity-2="ent0005" data-link-type="dependency" data-source-line="22" id="lnk11"><path d="M419.27,436.9979 C417.3,453.5379 418.45,472.1879 429.02,485.6779 C450.02,512.4879 524.049,529.3521 591.859,539.8621" fill="none" id="ITEM-to-REORDER" style="stroke:#555555;stroke-width:1.3;"/><polygon fill="#555555" points="596.8,540.6279,588.5188,535.2966,591.859,539.8621,587.2935,543.2023,596.8,540.6279" style="stroke:#555555;stroke-width:1.3;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="362.2064" x="430.02" y="481.5749">drag-drop (x-midpoint on the strip, y-midpoint in the panel)</text></g><!--link ITEM to CTX--><g class="link" data-entity-1="ent0002" data-entity-2="ent0006" data-link-type="dependency" data-source-line="23" id="lnk12"><path d="M353.54,436.8279 C343.29,445.2279 334.18,455.1379 328.02,466.6779 C320.16,481.4079 319.0663,494.6857 321.0363,510.6157" fill="none" id="ITEM-to-CTX" style="stroke:#555555;stroke-width:1.3;"/><polygon fill="#555555" points="321.65,515.5779,324.5152,506.155,321.0363,510.6157,316.5757,507.1369,321.65,515.5779" style="stroke:#555555;stroke-width:1.3;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="59.7611" x="329.02" y="481.5749">right-click</text></g><!--link REORDER to MODEL--><g class="link" data-entity-1="ent0005" data-entity-2="ent0001" data-link-type="dependency" data-source-line="24" id="lnk13"><path d="M772.43,515.5579 C782.34,507.0779 791.15,497.1279 797.02,485.6779 C864.21,