<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="903px" preserveAspectRatio="none" style="width:671px;height:903px;background:#FBF8EF;" version="1.1" viewBox="0 0 671 903" width="671px" zoomAndPan="magnify"><?plantuml $version$?><defs/><g><rect fill="#FBF8EF" height="903" style="stroke:none;stroke-width:1;" width="671" x="0" y="0"/><g class="title" data-source-line="6"><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="629.3676" x="20" y="34.9659">MathJax inline ink-loss &#8212; a reproducible experiment (hypothesis -&gt; fix -&gt; re-measurement)</text></g><ellipse cx="341.2259" cy="65.0679" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#E3F2ED" height="101.7206" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="328.3422" x="177.0548" y="95.0679"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" font-weight="700" lengthAdjust="spacing" textLength="70.2965" x="187.0548" y="117.896">Hypothesis.</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="231.5896" x="260.4713" y="117.896">MathJax 4 defaults `linebreaks.inline` ON;</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="285.1821" x="187.0548" y="134.2401">typesetting off-DOM through liteAdaptor, it has no</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="275.642" x="187.0548" y="150.5842">container to measure, so it splits inline math into</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="219.7816" x="187.0548" y="166.9283">one `&lt;svg&gt;` per break opportunity, and</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="308.3422" x="187.0548" y="183.2725">`svg:not(:root){overflow:hidden}` clips the first viewBox</text><rect fill="#C7E8DE" height="69.0323" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="322.8582" x="179.7968" y="216.7885"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" font-weight="700" lengthAdjust="spacing" textLength="49.9444" x="189.7968" y="239.6166">Method.</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="164.0052" x="242.8612" y="239.6166">Render a corpus of 154 files /</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="302.8582" x="189.7968" y="255.9607">1743 inline-math occurrences; count occurrences that</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="291.3501" x="189.7968" y="272.3048">split into multiple `&lt;svg&gt;` and those losing &gt;50% ink</text><rect fill="#F0C0BF" height="85.3765" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="274.2219" x="204.1149" y="305.8208"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" font-weight="700" lengthAdjust="spacing" textLength="77.1366" x="214.1149" y="328.6489">Observation.</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="122.2689" x="294.3715" y="328.6489">385 occurrences split;</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="138.421" x="214.1149" y="344.993">35 lost &gt;50% of their ink;</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="254.2219" x="214.1149" y="361.3371">`\implies` / `\iff` rendered completely invisible</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="233.8457" x="214.1149" y="377.6813">(a gap of the right width, no ink, no error)</text><rect fill="#D7EEC1" height="69.0323" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="335.2422" x="173.6047" y="411.1973"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" font-weight="700" lengthAdjust="spacing" textLength="79.4885" x="183.6047" y="434.0254">Intervention.</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="165.0732" x="266.2133" y="434.0254">Set `linebreaks: {inline: false}`</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="315.2422" x="183.6047" y="450.3695">(each expression is rendered once, cached, injected as a</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="256.1779" x="183.6047" y="466.7136">static SVG into a column it cannot reflow into)</text><rect fill="#EBF4E1" height="69.0323" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="243.3936" x="219.5291" y="500.2296"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" font-weight="700" lengthAdjust="spacing" textLength="106.5247" x="229.5291" y="523.0577">Re-measurement.</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="76.1645" x="339.1738" y="523.0577">Same corpus:</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="165.3372" x="229.5291" y="539.4018">0 occurrences split, 0 lost ink;</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="223.3936" x="229.5291" y="555.7459">display math byte-identical before/after</text><polygon fill="#F1F1F1" points="277.4263,589.262,405.0254,589.262,417.0254,601.262,405.0254,613.262,277.4263,613.262,265.4263,601.262,277.4263,589.262" style="stroke:#181818;stroke-width:0.5;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="11" lengthAdjust="spacing" textLength="127.5991" x="277.4263" y="605.5299">split = 0 and ink-loss = 0?</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="11" lengthAdjust="spacing" textLength="17.0829" x="248.3434" y="598.039">yes</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="11" lengthAdjust="spacing" textLength="13.4529" x="417.0254" y="598.039">no</text><rect fill="#D7EEC1" height="69.0323" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="250.9297" x="87.8382" y="623.262"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" font-weight="700" lengthAdjust="spacing" textLength="68.8565" x="97.8382" y="646.0901">Conclusion.</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="127.0809" x="169.8147" y="646.0901">Hypothesis confirmed;</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="230.9297" x="97.8382" y="662.4342">regression pinned by the electron smoke</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="195.6494" x="97.8382" y="678.7783">(fails on any CSP console message)</text><ellipse cx="213.3031" cy="738.2943" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="213.3031" cy="738.2943" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><rect fill="#F5E1E0" height="36.3441" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="220.7614" x="358.7679" y="623.262"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="200.7614" x="368.7679" y="646.0901">derive a new hypothesis and repeat</text><ellipse cx="469.1487" cy="705.6061" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="469.1487" cy="705.6061" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#555555;stroke-width:1.3;" x1="341.2259" x2="341.2259" y1="75.0679" y2="95.0679"/><polygon fill="#555555" points="337.2259,85.0679,341.2259,95.0679,345.2259,85.0679,341.2259,89.0679" style="stroke:#555555;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#555555;stroke-width:1.3;" x1="341.2259" x2="341.2259" y1="196.7885" y2="216.7885"/><polygon fill="#555555" points="337.2259,206.7885,341.2259,216.7885,345.2259,206.7885,341.2259,210.7885" style="stroke:#555555;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#555555;stroke-width:1.3;" x1="341.2259" x2="341.2259" y1="285.8208" y2="305.8208"/><polygon fill="#555555" points="337.2259,295.8208,341.2259,305.8208,345.2259,295.8208,341.2259,299.8208" style="stroke:#555555;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#555555;stroke-width:1.3;" x1="341.2259" x2="341.2259" y1="391.1973" y2="411.1973"/><polygon fill="#555555" points="337.2259,401.1973,341.2259,411.1973,345.2259,401.1973,341.2259,405.1973" style="stroke:#555555;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#555555;stroke-width:1.3;" x1="341.2259" x2="341.2259" y1="480.2296" y2="500.2296"/><polygon fill="#555555" points="337.2259,490.2296,341.2259,500.2296,345.2259,490.2296,341.2259,494.2296" style="stroke:#555555;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#555555;stroke-width:1.3;" x1="213.3031" x2="213.3031" y1=