" font-weight="700" lengthAdjust="spacing" textLength="57.3438" x="93.9337" y="792.2603">Concept</text><rect fill="#2D9574" height="19.0679" style="stroke:none;stroke-width:1;" width="53.2978" x="36.9959" y="796.3622"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="14.5599" x="36.9959" y="811.3282">&#160;&#160;&#160;&#160;</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="227.5271" x="93.9337" y="811.3282">MathJax rendering / measurement</text><rect fill="#E0211D" height="19.0679" style="stroke:none;stroke-width:1;" width="53.2978" x="36.9959" y="815.4302"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="14.5599" x="36.9959" y="830.3961">&#160;&#160;&#160;&#160;</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="105.7136" x="93.9337" y="830.3961">observed defect</text><rect fill="#67B11D" height="19.0679" style="stroke:none;stroke-width:1;" width="53.2978" x="36.9959" y="834.4981"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="14.5599" x="36.9959" y="849.464">&#160;&#160;&#160;&#160;</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="87.1217" x="93.9337" y="849.464">fix confirmed</text><line style="stroke:#000000;stroke-width:1;" x1="36.9959" x2="325.1008" y1="777.2943" y2="777.2943"/><line style="stroke:#000000;stroke-width:1;" x1="36.9959" x2="325.1008" y1="796.3622" y2="796.3622"/><line style="stroke:#000000;stroke-width:1;" x1="36.9959" x2="325.1008" y1="815.4302" y2="815.4302"/><line style="stroke:#000000;stroke-width:1;" x1="36.9959" x2="325.1008" y1="834.4981" y2="834.4981"/><line style="stroke:#000000;stroke-width:1;" x1="36.9959" x2="325.1008" 