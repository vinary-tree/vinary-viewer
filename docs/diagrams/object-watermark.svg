<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="883px" preserveAspectRatio="none" style="width:1127px;height:883px;background:#FBF8EF;" version="1.1" viewBox="0 0 1127 883" width="1127px" zoomAndPan="magnify"><?plantuml $version$?><defs/><g><rect fill="#FBF8EF" height="883" style="stroke:none;stroke-width:1;" width="1127" x="0" y="0"/><g class="title" data-source-line="11"><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="629.5889" x="245.2367" y="24.9659">Watermark emblem pipeline &#8212; vinary-tree-logo.svg &#8594; &lt;img&gt; + grayscale filter &#8594; faint logo</text></g><!--cluster SVG--><g class="cluster" data-qualified-name="SVG" data-source-line="14" id="ent0001"><rect fill="#EEEBE8" height="152.21" rx="4" ry="4" style="stroke:#888888;stroke-width:1;" width="285" x="273" y="47.0679"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="140.2515" x="345.3743" y="64.0339">vinary-tree-logo.svg</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="175.7553" x="327.6223" y="83.1018">(resources/public/assets)</text></g><!--cluster IMG--><g class="cluster" data-qualified-name="IMG" data-source-line="19" id="ent0003"><rect fill="#E3F2ED" height="323.8" rx="4" ry="4" style="stroke:#888888;stroke-width:1;" width="551" x="7" y="284.2779"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="336.8526" x="114.0737" y="301.2439">.vv-watermark-logo  &lt;img&gt;  (views.cljs + app.css)</text></g><!--cluster OUT--><g class="cluster" data-qualified-name="OUT" data-source-line="26" id="ent0007"><rect fill="#1F6B53" height="152.21" rx="4" ry="4" style="stroke:#888888;stroke-width:1;" width="297" x="598" y="465.4079"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="125.0615" x="683.9692" y="482.3739">rendered emblem</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="281.847" x="605.5765" y="501.4418">.vv-watermark &gt; img.vv-watermark-logo</text></g><!--entity SVGBODY--><g class="entity" data-qualified-name="SVG.SVGBODY" data-source-line="15" id="ent0002"><rect fill="#FBF8EF" height="63.2038" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="217.3712" x="297.31" y="112.0679"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="197.3712" x="307.31" y="130.0339">the full-color Vinary Tree crest</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="183.8193" x="307.31" y="149.1018">(heraldic shield + tree-of-life</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="178.9193" x="307.31" y="168.1697">+ 'VINARY TREE' wordmark)</text></g><!--entity TAG--><g class="entity" data-qualified-name="IMG.TAG" data-source-line="20" id="ent0004"><rect fill="#FBF8EF" height="44.1358" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="231.5812" x="31.21" y="330.2779"/><text fill="#000000" font-family="monospace" font-size="14" lengthAdjust="spacing" textLength="125.9995" x="41.21" y="348.2439">(Cannot&#160;decode)</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="211.5812" x="41.21" y="367.3118">centered by .vv-watermark (flex)</text></g><!--entity SIZE--><g class="entity" data-qualified-name="IMG.SIZE" data-source-line="21" id="ent0005"><rect fill="#FBF8EF" height="44.1358" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="216.5872" x="297.71" y="330.2779"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="196.5872" x="307.71" y="348.2439">width: 40%; max-width: 360px</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="79.8977" x="307.71" y="367.3118">height: auto</text></g><!--entity FADE--><g class="entity" data-qualified-name="IMG.FADE" data-source-line="22" id="ent0006"><rect fill="#FBF8EF" height="44.1358" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="140.3855" x="76.81" y="539.9479"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="120.3855" x="86.81" y="557.9139">filter : grayscale(1)</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="82.6277" x="86.81" y="576.9818">opacity: 0.08</text></g><!--entity EMBLEM--><g class="entity" data-qualified-name="OUT.EMBLEM" data-source-line="27" id="ent0008"><rect fill="#FBF8EF" height="63.2038" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="190.2393" x="621.88" y="530.4079"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="128.8415" x="631.88" y="548.3739">a faint, desaturated</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="110.9916" x="631.88" y="567.4418">Vinary Tree logo,</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="170.2393" x="631.88" y="586.5097">centered in the empty tab</text></g><g class="entity" data-qualified-name="GMN11" data-source-line="35" id="ent0012"><path d="M581.93,676.6179 L581.93,749.442 A4,4 0 0 0 585.93,753.442 L1108.0623,753.442 A4,4 0 0 0 1112.0623,749.442 L1112.0623,682.6179 L1102.0623,672.6179 L585.93,672.6179 A4,4 0 0 0 581.93,676.6179" fill="#FFF6D6" style="stroke:#7F6B14;stroke-width:0.5;"/><path d="M1102.0623,672.6179 L1102.0623,680.6179 A2,2 0 0 0 1104.0623,682.6179 L1112.0623,682.6179 L1102.0623,672.6179" fill="#FFF6D6" style="stroke:#7F6B14;stroke-width:1;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="105.5991" x="587.93" y="691.5149">The watermark is</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="129.2591" x="696.9091" y="691.5149">theme-independent</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="260.5073" x="826.1682" y="691.5149">: the logo is desaturated and faded by CSS,</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="509.1323" x="587.93" y="709.2209">so it reads the same faint grayscale in every theme. (The earlier CSS-mask design &#8212;</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="508.8594" x="587.93" y="726.927">ADR-0007 &#8212; tinted a monochrome shield.svg with --vv-fg; it was superseded by this</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="291.8633" x="587.93" y="744.633">full-color logo, and shield.svg is now orphaned.)</text></g><!--link SVG to IMG--><g class="link" data-entity-1="ent0001" data-entity-2="ent0003" data-link-type="dependency" data-source-line="31" id="lnk9"><path d="M550,199.3627 C550,199.7124 550,200.0631 550,200.4148 C550,201.1181 550,201.8252 550,202.5359 C550,205.3785 550,208.2785 550,211.2244 C550,223.0078 550,235.5251 550,248.0417 C550,254.2999 550,260.5581 550,266.7242 C550,269.8072 550,272.8673 550,275.8929 C550,277.4057 550,278.9098 550,280.404 C550,281.151 550,281.8956 550,282.6374 C550,283.0084 550,278.3786 550,278.7482" fill="none" id="SVG-to-IMG" style="stroke:#6F5E47;stroke-width:2;"/><polygon fill="#6F5E47" points="550,283.7482,554,274.7482,550,278.7482,546,274.7482,550,283.7482" style="stroke:#6F5E47;stroke-width:2;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="137.8131" x="566.249" y="238.1749">(1) loaded as an &lt;img&gt;</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="168.3112" x="551" y="255.8809">(its own colors, drawn as-is)</text></g><!--link IMG to OUT--><g class="link" data-entity-1="ent0003" data-entity-2="ent0007" data-link-type="dependency" data-source-line="32" id="lnk10"><path d="M558.255,353.3766 C558.918,353.3879 559.618,353.4015 560.3538,353.4177 C566.2402,353.5473 574.4207,353.8464 584.332,354.5142 C604.1547,355.8498 630.9006,358.6604 660.0638,364.5404 C718.39,376.3004 786.385,400.3379 828,449.4079 C832.0038,454.1304 833.1181,454.8864 835.8376,460.4626" fill="none" id="IMG-to-OUT" style="stroke:#1F6B53;stroke-width:2;"/><polygon fill="#1F6B53" points="838.0294,464.9566,837.6794,455.114,835.8376,460.4626,830.489,458.6208,838.0294,464.9566" style="stroke:#1F6B53;stroke-width:2;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="187.2262" x="818.35" y="419.3049">(2) desaturated by grayscale(1)</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="146.7961" x="838.565" y="437.0109">and faded to 8% opacity</text></g><!--link OUT to GMN11--><g class="link" data-entity-1="ent0007" data-entity-2="ent0012" data-link-type="association" data-source-line="35" id="lnk13"><path d="