ll="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="174.7193" x="41.19" y="206.3055">+ 'VINARY TREE' wordmark</text></g><!--entity BOX--><g class="entity" data-qualified-name="SHIELD.BOX" data-source-line="20" id="ent0004"><rect fill="#FBF8EF" height="44.1358" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="113.5476" x="78.23" y="377.9479"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="91.6436" x="88.23" y="395.9139">width  : 300px</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="93.5476" x="88.23" y="414.9818">height : 360px</text></g><!--entity MASK--><g class="entity" data-qualified-name="SHIELD.MASK" data-source-line="21" id="ent0005"><rect fill="#FBF8EF" height="63.2038" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="231.9172" x="227.04" y="368.4079"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="196.7132" x="237.04" y="386.3739">mask : url(../assets/shield.svg)</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="171.8633" x="262.5199" y="405.4418">center / contain no-repeat</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="211.9172" x="237.04" y="424.5097">(only opaque SVG pixels survive)</text></g><!--entity FILL--><g class="entity" data-qualified-name="SHIELD.FILL" data-source-line="22" id="ent0006"><rect fill="#FBF8EF" height="44.1358" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="218.3512" x="77.82" y="597.1479"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="198.3512" x="87.82" y="615.1139">background-color : var(--vv-fg)</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="119.0275" x="87.82" y="634.1818">opacity          : 0.07</text></g><!--entity FGVAR--><g class="entity" data-qualified-name="THEME.FGVAR" data-source-line="27" id="ent0008"><rect fill="#FBF8EF" height="63.2038" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="187.2993" x="338.35" y="131.1379"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="167.2993" x="348.35" y="149.1039">--vv-fg  (base foreground)</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="99.6516" x="348.35" y="168.1718">dark : #b2b2b2</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="94.0236" x="348.35" y="187.2397">light: #655370</text></g><!--entity EMBLEM--><g class="entity" data-qualified-name="OUT.EMBLEM" data-source-line="32" id="ent0010"><rect fill="#FBF8EF" height="63.2038" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="190.2393" x="565.88" y="587.6179"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="134.8475" x="575.88" y="605.5839">a faint, theme-tinted</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="147.4334" x="575.88" y="624.6518">Vinary Tree silhouette,</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" lengthAdjust="spacing" textLength="170.2393" x="575.88" y="643.7197">centered in the empty tab</text></g><g class="entity" data-qualified-name="GMN14" data-source-line="41" id="ent0015"><path d="M557.63,733.8179 L557.63,788.936 A4,4 0 0 0 561.63,792.936 L1020.3743,792.936 A4,4 0 0 0 1024.3743,788.936 L1024.3743,739.8179 L1014.3743,729.8179 L561.63,729.8179 A4,4 0 0 0 557.63,733.