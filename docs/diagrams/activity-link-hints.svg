<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="976px" preserveAspectRatio="none" style="width:994px;height:976px;background:#FBF8EF;" version="1.1" viewBox="0 0 994 976" width="994px" zoomAndPan="magnify"><?plantuml $version$?><defs/><g><rect fill="#FBF8EF" height="976" style="stroke:none;stroke-width:1;" width="994" x="0" y="0"/><g class="title" data-source-line="6"><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="318.5127" x="337.1331" y="34.9659">Vimium link hints &#8212; f then a label then follow</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="255.471" x="368.6539" y="54.0339">[:ui :hints] = active? + targets + typed</text></g><rect fill="#FFFFCC" height="89.4799" rx="2.5" ry="2.5" style="stroke:#FFDD88;stroke-width:3;" width="963.7789" x="13" y="72.1358"/><text fill="#000000" font-family="monospace" font-size="10" lengthAdjust="spacing" textLength="534" x="20" y="84.7558">This&#160;syntax&#160;is&#160;deprecated,&#160;you&#160;must&#160;add&#160;&lt;&lt;#2D9574&gt;&gt;&#160;at&#160;the&#160;end&#160;of&#160;the&#160;line,&#160;after&#160;the&#160;';'</text><text fill="#000000" font-family="monospace" font-size="10" lengthAdjust="spacing" textLength="534" x="20" y="108.3758">This&#160;syntax&#160;is&#160;deprecated,&#160;you&#160;must&#160;add&#160;&lt;&lt;#BC6EC5&gt;&gt;&#160;at&#160;the&#160;end&#160;of&#160;the&#160;line,&#160;after&#160;the&#160;';'</text><text fill="#000000" font-family="monospace" font-size="10" lengthAdjust="spacing" textLength="534" x="20" y="131.9958">This&#160;syntax&#160;is&#160;deprecated,&#160;you&#160;must&#160;add&#160;&lt;&lt;#7590DB&gt;&gt;&#160;at&#160;the&#160;end&#160;of&#160;the&#160;line,&#160;after&#160;the&#160;';'</text><text fill="#000000" font-family="monospace" font-size="10" lengthAdjust="spacing" textLength="534" x="20" y="155.6158">This&#160;syntax&#160;is&#160;deprecated,&#160;you&#160;must&#160;add&#160;&lt;&lt;#B1951D&gt;&gt;&#160;at&#160;the&#160;end&#160;of&#160;the&#160;line,&#160;after&#160;the&#160;';'</text><ellipse cx="265.0706" cy="178.6158" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#EAF6FF" height="36.3441" rx="4" ry="4" style="stroke:#4C66AE;stroke-width:0.5;" width="321.4302" x="104.3555" y="208.6158"/><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="301.4302" x="114.3555" y="231.4439">press f (resolver, Vim normal) then dispatch hint/start</text><rect fill="#EAF6FF" height="52.6882" rx="4" ry="4" style="stroke:#4C66AE;stroke-width:0.5;" width="315.3341" x="107.4035" y="264.9599"/><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="295.3341" x="117.4035" y="287.788">hints/collect &#8212; every visible link in the content pane,</text><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="289.5141" x="117.4035" y="304.1321">classify (file / http / dir / anchor) + viewport position</text><rect fill="#EAF6FF" height="52.6882" rx="4" ry="4" style="stroke:#4C66AE;stroke-width:0.5;" width="295.9899" x="117.0756" y="337.6481"/><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="275.9899" x="127.0756" y="360.4762">hints/with-labels &#8212; uniform-length unique labels</text><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="269.4139" x="127.0756" y="376.8203">from a home-row alphabet (SADFJKLEWCMPGH)</text><rect fill="#EAF6FF" height="36.3441" rx="4" ry="4" style="stroke:#4C66AE;stroke-width:0.5;" width="269.7458" x="130.1977" y="410.3364"/><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="249.7458" x="140.1977" y="433.1644">ui-hints state becomes active; overlay drawn</text><rect fill="#EAF6FF" height="36.3441" rx="4" ry="4" style="stroke:#4C66AE;stroke-width:0.5;" width="258.3337" x="135.9037" y="466.6805"/><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="238.3337" x="145.9037" y="489.5086">overlay draws a label badge over each link</text><rect fill="#EAF6FF" height="52.6882" rx="4" ry="4" style="stroke:#4C66AE;stroke-width:0.5;" width="289.4739" x="120.3336" y="523.0246"/><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="200.6054" x="130.3336" y="545.8527">type a label character; typed grows;</text><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="269.4739" x="130.3336" y="562.1968">matches = targets whose label starts-with typed</text><polygon fill="#FFF6D6" points="191.3106,595.7128,338.8306,595.7128,350.8306,607.7128,338.8306,619.7128,191.3106,619.7128,179.3106,607.7128,191.3106,595.7128" style="stroke:#7F6B14;stroke-width:0.5;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="11" lengthAdjust="spacing" textLength="147.52" x="191.3106" y="611.9808">how many labels still match?</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="11" lengthAdjust="spacing" textLength="45.0447" x="134.2659" y="604.4898">exactly 1</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="11" lengthAdjust="spacing" textLength="59.1026" x="350.8306" y="604.4898">zero, or Esc</text><rect fill="#EAF6FF" height="52.6882" rx="4" ry="4" style="stroke:#4C66AE;stroke-width:0.5;" width="270.1178" x="16" y="629.7128"/><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="243.9618" x="26" y="652.5409">follow &#8212; file to doc/open &#183; http to web view</text><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="250.1178" x="26" y="668.885">&#183; dir to open-path &#183; anchor to scroll-into-view</text><rect fill="#EAF6FF" height="36.3441" rx="4" ry="4" style="stroke:#4C66AE;stroke-width:0.5;" width="145.9289" x="306.1178" y="629.7128"/><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="125.9289" x="316.1178" y="652.5409">clear the hints (cancel)</text><polygon fill="#FFF6D6" points="265.0706,688.401,277.0706,700.401,265.0706,712.401,253.0706,700.401,265.0706,688.401" style="stroke:#7F6B14;stroke-width:0.5;stroke-linejoin:miter;stroke-miterlimit:10;"/><path d="M296.0706,722.401 L296.0706,767.6661 L276.0706,771.6661 L296.0706,775.6661 L296.0706,820.9311 A0,0 0 0 0 296.0706,820.9311 L973.7789,820.9311 A0,0 0 0 0 973.7789,820.9311 L973.7789,732.401 L963.7789,722.401 L296.0706,722.401 A0,0 0 0 0 296.0706,722.401" fill="#FFF6D6" style="stroke:#7F6B14;stroke-width:0.5;"/><path d="M963.7789,722.401 L963.7789,732.401 L973.7789,732.401 L963.7789,722.401" fill="#FFF6D6" style="stroke:#7F6B14;stroke-width:0.5;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="656.7083" x="302.0706" y="741.2981">Per-keystroke loop: the type step repeats while two or more labels match &#8212; non-matching badges hide and</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="654.4984" x="302.0706" y="759.0041">filtering continues; Backspace pops a char; the decision above resolves the typing. A capture-phase window</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="625.9372" x="302.0706" y="776.7101">key listener owns the keyboard ONLY while hints are active (pre-empting the global resolver), so f itself</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="637.3385" x="302.0706" y="794.4161">still reaches the resolver to START hinting. PDF pages are excluded (Chromium's plugin viewer cannot be</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="587.0676" x="302.0706" y="812.1221">script-injected); HTTP pages run their own self-contained f-hint mode injected by web-preload.js.</text><ellipse cx="265.0706" cy="771.6661" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="265.0706" cy="771.6661" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#555555;stroke-width:1.3;" x1="265.0706" x2="265.0706" y1="188.6158" y2="208.6158"/><polygon fill="#555555" points="261.0706,198.6158,265.0706,208.6158,269.0706,198.6158,265.0706,202.6158" style="stroke:#555555;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#555555;stroke-width:1.3;" x1="265.0706" x2="265.0706" y1="244.9599" y2="264.9599"/><polygon fill="#555555" points="261.0706,254.9599,265.0706,264.9599,269.0706,254.9599,265.0706,258.9599" style="stroke:#555555;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#555555;stroke-width:1.3;" x1="265.0706" x2="265.0706" y1="317.6481" y2="337.6481"/><polygon fill="#555555" points="261.0706,327.6481,265.0706,337.6481,269.0706,327.6481,265.0706,331.6481" style="stroke:#555555;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#555555;stroke-width:1.3;" x1="265.0706" x2="265.0706" y1="390.3364" y2="410.3364"/><polygon fill="#555555" points="261.0706,400.3364,265.0706,410.3364,269.0706,400.3364,265.0706,404.3364" style="stroke:#