<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="881px" preserveAspectRatio="none" style="width:994px;height:881px;background:#FBF8EF;" version="1.1" viewBox="0 0 994 881" width="994px" zoomAndPan="magnify"><?plantuml $version$?><defs/><g><rect fill="#FBF8EF" height="881" style="stroke:none;stroke-width:1;" width="994" x="0" y="0"/><g class="title" data-source-line="6"><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="318.5127" x="337.1331" y="34.9659">Vimium link hints &#8212; f then a label then follow</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="255.471" x="368.6539" y="54.0339">[:ui :hints] = active? + targets + typed</text></g><ellipse cx="265.0706" cy="84.1358" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#C7E8DE" height="36.3441" rx="4" ry="4" style="stroke:#4C66AE;stroke-width:0.5;" width="321.4302" x="104.3555" y="114.1358"/><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="301.4302" x="114.3555" y="136.9639">press f (resolver, Vim normal) then dispatch hint/start</text><rect fill="#E2CAE5" height="52.6882" rx="4" ry="4" style="stroke:#4C66AE;stroke-width:0.5;" width="315.3341" x="107.4035" y="170.4799"/><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="295.3341" x="117.4035" y="193.308">hints/collect &#8212; every visible link in the content pane,</text><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="289.5141" x="117.4035" y="209.6522">classify (file / http / dir / anchor) + viewport position</text><rect fill="#E2CAE5" height="52.6882" rx="4" ry="4" style="stroke:#4C66AE;stroke-width:0.5;" width="295.9899" x="117.0756" y="243.1682"/><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="275.9899" x="127.0756" y="265.9963">hints/with-labels &#8212; uniform-length unique labels</text><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="269.4139" x="127.0756" y="282.3404">from a home-row alphabet (SADFJKLEWCMPGH)</text><rect fill="#C5CFEA" height="36.3441" rx="4" ry="4" style="stroke:#4C66AE;stroke-width:0.5;" width="269.7458" x="130.1977" y="315.8564"/><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="249.7458" x="140.1977" y="338.6845">ui-hints state becomes active; overlay drawn</text><rect fill="#C7E8DE" height="36.3441" rx="4" ry="4" style="stroke:#4C66AE;stroke-width:0.5;" width="258.3337" x="135.9037" y="372.2005"/><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="238.3337" x="145.9037" y="395.0286">overlay draws a label badge over each link</text><rect fill="#C5CFEA" height="52.6882" rx="4" ry="4" style="stroke:#4C66AE;stroke-width:0.5;" width="289.4739" x="120.3336" y="428.5446"/><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="200.6054" x="130.3336" y="451.3727">type a label character; typed grows;</text><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="269.4739" x="130.3336" y="467.7168">matches = targets whose label starts-with typed</text><polygon fill="#FFF6D6" points="191.3106,501.2329,338.8306,501.2329,350.8306,513.2329,338.8306,525.2329,191.3106,525.2329,179.3106,513.2329,191.3106,501.2329" style="stroke:#7F6B14;stroke-width:0.5;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="11" lengthAdjust="spacing" textLength="147.52" x="191.3106" y="517.5008">how many labels still match?</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="11" lengthAdjust="spacing" textLength="45.0447" x="134.2659" y="510.0099">exactly 1</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="11" lengthAdjust="spacing" textLength="59.1026" x="350.8306" y="510.0099">zero, or Esc</text><rect fill="#EEE6C1" height="52.6882" rx="4" ry="4" style="stroke:#4C66AE;stroke-width:0.5;" width="270.1178" x="16" y="535.2329"/><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="243.9618" x="26" y="558.061">follow &#8212; file to doc/open &#183; http to web view</text><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="250.1178" x="26" y="574.4051">&#183; dir to open-path &#183; anchor to scroll-into-view</text><rect fill="#C5CFEA" height="36.3441" rx="4" ry="4" style="stroke:#4C66AE;stroke-width:0.5;" width="145.9289" x="306.1178" y="535.2329"/><text fill="#1A1A1A" font-family="'Inter, Helvetica, sans-serif'" font-size="12" lengthAdjust="spacing" textLength="125.9289" x="316.1178" y="558.061">clear the hints (cancel)</text><polygon fill="#FFF6D6" points="265.0706,593.9211,277.0706,605.9211,265.0706,617.9211,253.0706,605.9211,265.0706,593.9211" style="stroke:#7F6B14;stroke-width:0.5;stroke-linejoin:miter;stroke-miterlimit:10;"/><path d="M296.0706,627.9211 L296.0706,673.1861 L276.0706,677.1861 L296.0706,681.1861 L296.0706,726.4512 A0,0 0 0 0 296.0706,726.4512 L973.7789,726.4512 A0,0 0 0 0 973.7789,726.4512 L973.7789,637.9211 L963.7789,627.9211 L296.0706,627.9211 A0,0 0 0 0 296.0706,627.9211" fill="#FFF6D6" style="stroke:#7F6B14;stroke-width:0.5;"/><path d="M963.7789,627.9211 L963.7789,637.9211 L973.7789,637.9211 L963.7789,627.9211" fill="#FFF6D6" style="stroke:#7F6B14;stroke-width:0.5;"/><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="656.7083" x="302.0706" y="646.8181">Per-keystroke loop: the type step repeats while two or more labels match &#8212; non-matching badges hide and</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="654.4984" x="302.0706" y="664.5241">filtering continues; Backspace pops a char; the decision above resolves the typing. A capture-phase window</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="625.9372" x="302.0706" y="682.2301">key listener owns the keyboard ONLY while hints are active (pre-empting the global resolver), so f itself</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="637.3385" x="302.0706" y="699.9362">still reaches the resolver to START hinting. PDF pages are excluded (Chromium's plugin viewer cannot be</text><text fill="#000000" font-family="'Inter, Helvetica, sans-serif'" font-size="13" lengthAdjust="spacing" textLength="587.0676" x="302.0706" y="717.6422">script-injected); HTTP pages run their own self-contained f-hint mode injected by web-preload.js.</text><ellipse cx="265.0706" cy="677.1861" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="265.0706" cy="677.1861" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#555555;stroke-width:1.3;" x1="265.0706" x2="265.0706" y1="94.1358" y2="114.1358"/><polygon fill="#555555" points="261.0706,104.1358,265.0706,114.1358,269.0706,104.1358,265.0706,108.1358" style="stroke:#555555;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#555555;stroke-width:1.3;" x1="265.0706" x2="265.0706" y1="150.4799" y2="170.4799"/><polygon fill="#555555" points="261.0706,160.4799,265.07