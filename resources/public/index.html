<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!-- Content-Security-Policy — defense-in-depth now that markdown renders sanitized raw HTML into an
       innerHTML sink. The sanitizer (rehype-sanitize, GitHub allowlist) is the primary control; this CSP is
       the backstop: script-src has NO 'unsafe-inline', so even a sanitizer miss can't run inline <script> or
       on*-handlers. Local assets/scripts load via file:; pdf.js needs 'unsafe-eval', tree-sitter needs
       'wasm-unsafe-eval', pdf.js workers need blob:/worker-src. Remote: only https images (per project
       decision); connect-src blocks remote fetch/XHR exfil. localhost:* keeps `shadow-cljs watch` hot-reload
       working in dev (unused/harmless in the shipped build). object-src/base-uri/form-action/frame-src locked. -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'none';
    script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval' file: blob: http://localhost:* ws://localhost:*;
    style-src 'self' 'unsafe-inline' file:;
    img-src 'self' file: data: blob: https:;
    font-src 'self' file:;
    media-src 'self' file: blob:;
    connect-src 'self' file: data: blob: http://localhost:* ws://localhost:*;
    worker-src 'self' file: blob:;
    child-src 'self' blob:;
    object-src 'none'; base-uri 'none'; form-action 'none'; frame-src 'none';">
  <title>vinary-viewer</title>
  <!-- Active theme first (defines --vv-*), then the structural stylesheet that references it.
       Theme selection becomes reactive (re-frame) in P2; spacemacs-dark is the default. -->
  <link id="vv-theme-link" rel="stylesheet" href="css/themes/spacemacs-dark.css">
  <!-- Self-hosted fonts + Font Awesome, vendored locally by `npm run assets:sync`
       (no CDN). Loaded before app.css so it can reference --vv-font-* + icon glyphs. -->
  <link rel="stylesheet" href="assets/fonts/fonts.css">
  <link rel="stylesheet" href="assets/fa/css/fontawesome.min.css">
  <link rel="stylesheet" href="assets/fa/css/solid.min.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="app"></div>
  <script src="js/main.js"></script>
</body>
</html>
